<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Import Terms</title>
  <!-- Mounts the Svelte WordUpload island (the Alpine→Svelte port of the word
       import screen: frequency words + curated dictionaries + manual upload).
       Server-gated (Job-B-style): the file import, frequency-word import +
       Wiktionary enrichment, and curated-dictionary import all need a connected
       server, so word-upload.ts reveals the notice below and does NOT mount the
       island when local-first. No `lukaisu-modules` meta: the Svelte island is
       the sole renderer of the form AND its result — the Alpine `wordUploadPageApp`
       / `wordUploadFormApp` / `wordUploadResultApp` / `curatedDictBrowser` views
       were retired, and /word/upload (GET) 302s here. The POST upload endpoint is
       kept, but now returns JSON ({lastUpdate, rtl, recno}); the island
       fetch()-posts to it and renders the imported-terms table client-side. -->
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar (mountNavbar in main.ts). -->
  <div id="navbar-root" data-navbar-root data-current-page="terms"></div>
  <section class="section pt-4">
    <!-- No-server placeholder. word-upload.ts un-hides this (and skips mounting
         the island) when local-first; hidden in server-backed / same-origin modes. -->
    <div id="word-upload-offline" class="notification is-info is-light" hidden>
      <h2 class="title is-5">
        <span class="icon"><i data-lucide="file-up"></i></span>
        Importing terms needs a connected server
      </h2>
      <p class="block">
        Frequency-word import, curated dictionaries and uploading a vocabulary
        file are done by a Lukaisu Server, so this page lights up once you connect
        one.
      </p>
      <p class="block">
        Everything else — reading, saving words and reviewing — keeps working
        offline, with no server.
      </p>
      <button id="word-upload-connect" type="button" class="button is-primary">
        <span class="icon"><i data-lucide="server"></i></span>
        <span>Connect a server</span>
      </button>
    </div>

    <!-- Svelte WordUpload island mount point. word-upload.ts mounts here only when
         a server is connected; offline it stays empty and the notice above is
         revealed instead. -->
    <div id="word-upload-root"></div>
  </section>
  <script type="module" src="./word-upload.ts"></script>
</body>
</html>
