<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Print</title>
  <!-- The `text` module still self-registers the `textPrintApp` Alpine component
       for the PWA renderer; on this bundled page the print UI is the Svelte 5
       `TextPrintApp` island mounted into #text-print-root (no x-data here). -->
  <meta name="lukaisu-modules" content="text" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar (mountNavbar in main.ts).
       Hidden when printing so only the text below prints. -->
  <div class="noprint" id="navbar-root" data-navbar-root data-current-page="texts"></div>

  <!-- Svelte 5 print island (mounted by text-print.ts). Replaces the Alpine
       `textPrintApp` x-data region (plain-print options + rendered print
       content). The Alpine component (text_print_app.ts) still loads via the
       page's module meta but no-ops here with no x-data node, and stays as the
       PWA's renderer until the server UI retires. The print-only `@media print`
       CSS (.noprint / #print / #printoptions) lives in global css/base/styles. -->
  <div id="text-print-root"></div>

  <script type="module" src="./text-print.ts"></script>
</body>
</html>
