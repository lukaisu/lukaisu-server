<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Create account</title>
  <!-- Mounts the Svelte `RegisterPage` island (register.ts), the same-origin PWA
       sign-up screen. It registers against `POST /api/v1/auth/register` (token
       API), which sets the PHP session AND returns a bearer token, and replaces
       the retired server-rendered `register.php` form; the server's GET /register
       302s here. No `lukaisu-modules` meta: the island is the sole renderer.
       Guest layout — no authed navbar. The CSRF token + runtime config are
       injected into <head> by BundleController when it serves this shell. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-6-tablet is-5-desktop">
          <!-- Svelte 5 register island mount point (mounted by register.ts). -->
          <div id="register-root"></div>
        </div>
      </div>
    </div>
  </section>
  <script type="module" src="./register.ts"></script>
</body>
</html>
