<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Starter Vocabulary</title>
  <!-- Mounts the Svelte StarterVocab island (the Alpine→Svelte port of the
       post-language-creation import flow). Server-gated (Job-B-style): the
       frequency-word import + Wiktionary enrichment + curated-dictionary import
       need a connected server, so starter-vocab.ts reveals the notice below and
       does NOT mount the island when local-first. No `lukaisu-modules` meta: the
       Svelte island is the sole renderer — the Alpine `starter_vocab.ts` /
       `starter_vocab.php` view was retired, and /languages/{id}/starter-vocab
       302s here. -->
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar (mountNavbar in main.ts). -->
  <div id="navbar-root" data-navbar-root data-current-page="languages"></div>
  <section class="section pt-4">
    <!-- No-server placeholder. starter-vocab.ts un-hides this (and skips mounting
         the island) when local-first; hidden in server-backed / same-origin modes. -->
    <div id="starter-vocab-offline" class="notification is-info is-light" hidden>
      <h2 class="title is-5">
        <span class="icon"><i data-lucide="sparkles"></i></span>
        Starter vocabulary needs a connected server
      </h2>
      <p class="block">
        Frequency-word import and Wiktionary enrichment are done by a Lukaisu
        Server, so this page lights up once you connect one.
      </p>
      <p class="block">
        Everything else — reading, saving words and reviewing — keeps working
        offline, with no server.
      </p>
      <button id="starter-vocab-connect" type="button" class="button is-primary">
        <span class="icon"><i data-lucide="server"></i></span>
        <span>Connect a server</span>
      </button>
    </div>

    <!-- Svelte StarterVocab island mount point. starter-vocab.ts mounts here only
         when a server is connected; offline it stays empty and the notice above is
         revealed instead. -->
    <div id="starter-vocab-root"></div>
  </section>
  <script type="module" src="./starter-vocab.ts"></script>
</body>
</html>
