<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Terms</title>
  <meta name="lukaisu-modules" content="vocabulary,language" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar (mountNavbar in main.ts). -->
  <div id="navbar-root" data-navbar-root data-current-page="terms"></div>
  <section class="section pt-4">
    <h1 class="title is-4">Terms</h1>
    <!-- Body prerendered from src/Modules/Vocabulary/Views/list_alpine.php.
         Regenerate: php build/prerender-app-view.php -->
    
    <div class="card action-card mb-4">
        <div class="card-content">
            <div class="buttons is-centered">
                                <a href="/words/new" class="button is-light is-primary">
                        <span class="icon"><i data-lucide="circle-plus" class="icon" aria-label="Import Single Term" style="width:16px;height:16px"></i></span>
                        <span>Import Single Term</span>
                    </a>                <a href="/word/upload" class="button is-light">
                        <span class="icon"><i data-lucide="file-up" class="icon" aria-label="Import Terms" style="width:16px;height:16px"></i></span>
                        <span>Import Terms</span>
                    </a>                <a href="/word/tags" class="button is-light">
                        <span class="icon"><i data-lucide="tags" class="icon" aria-label="Term Tags" style="width:16px;height:16px"></i></span>
                        <span>Term Tags</span>
                    </a>
            </div>
        </div>
    </div>
    <!-- Alpine.js container for word list -->
    <div x-data="wordListApp" x-cloak>
    
        <!-- Loading state -->
        <div x-show="loading" class="has-text-centered py-6">
            <span class="icon is-large">
                <i data-lucide="loader-2" class="icon animate-spin" aria-label="Loading" style="width:16px;height:16px"></i>        </span>
            <p class="mt-2">Loading terms...</p>
        </div>
    
        <!-- Filter bar -->
        <div x-show="!loading" class="box mb-4">
            <div class="columns is-multiline is-vcentered">
                <!-- Text filter (only when language is selected) -->
                <div class="column is-narrow" x-show="filters.lang && filterOptions.texts.length > 0">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Text</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :value="filters.text_id" @change="setFilterFromEvent('text_id', $event)">
                                    <option value="">All Texts</option>
                                    <template x-for="text in filterOptions.texts" :key="text.id">
                                        <option :value="text.id" x-text="text.title"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Status filter -->
                <div class="column is-narrow">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Status</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :value="filters.status" @change="setFilterFromEvent('status', $event)">
                                    <template x-for="status in filterOptions.statuses" :key="status.value">
                                        <option :value="status.value" x-text="status.label"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Tag filters -->
                <div class="column is-narrow" x-show="filterOptions.tags.length > 0">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Tag</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :value="filters.tag1" @change="setFilterFromEvent('tag1', $event)">
                                    <option value="">Any Tag</option>
                                    <template x-for="tag in filterOptions.tags" :key="tag.id">
                                        <option :value="tag.id" x-text="tag.name"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Sort -->
                <div class="column is-narrow">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Sort</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :value="filters.sort" @change="setFilterFromEvent('sort', $event)">
                                    <template x-for="sort in filterOptions.sorts" :key="sort.value">
                                        <option :value="sort.value" x-text="sort.label"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Per page -->
                <div class="column is-narrow">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Show</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :value="filters.per_page" @change="setPerPageFromEvent($event)">
                                    <template x-for="opt in perPageOptions" :key="opt">
                                        <option :value="opt" x-text="opt"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Column visibility -->
                <div class="column is-narrow">
                    <div class="dropdown" :class="columnsOpen ? 'is-active' : ''">
                        <div class="dropdown-trigger">
                            <button type="button" class="button is-small" @click="toggleColumnsDropdown()" @click.outside="closeColumnsDropdown()">
                                <span>Columns</span>
                                <span class="icon is-small">
                                    <i data-lucide="chevron-down" class="icon" aria-label="Toggle" style="width:16px;height:16px"></i>                            </span>
                            </button>
                        </div>
                        <div class="dropdown-menu" style="min-width: 10rem;">
                            <div class="dropdown-content">
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.romanization"
                                        @change="toggleColumn('romanization')" />
                                    Romanization                            </label>
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.translation"
                                        @change="toggleColumn('translation')" />
                                    Translation                            </label>
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.tags"
                                        @change="toggleColumn('tags')" /> Tags                            </label>
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.sentence"
                                        @change="toggleColumn('sentence')" /> Sentence                            </label>
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.status"
                                        @change="toggleColumn('status')" /> Status                            </label>
                                <label class="dropdown-item checkbox is-size-7">
                                    <input type="checkbox" :checked="columns.score"
                                        @change="toggleColumn('score')" /> Score                            </label>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Search query -->
                <div class="column">
                    <div class="field has-addons">
                        <div class="control is-expanded has-icons-left">
                            <input type="text"
                                   class="input is-small"
                                   placeholder="Search terms..."
                                   :value="filters.query"
                                   @input="syncQueryValue($event)"
                                   @keyup.enter="applyQueryFilter()"
                                   @keyup.debounce.500ms="applyQueryFilter()" />
                            <span class="icon is-left">
                                <i data-lucide="search" class="icon" aria-label="Search" style="width:16px;height:16px"></i>                        </span>
                        </div>
                        <div class="control">
                            <button type="button" class="button is-small" @click="resetFilters()"
                                title="Reset all filters">
                                <i data-lucide="x" class="icon" aria-label="Reset" style="width:16px;height:16px"></i>                        </button>
                        </div>
                    </div>
                </div>
            </div>
    
            <!-- Results summary -->
            <div class="level mt-3 pt-3" style="border-top: 1px solid #dbdbdb;" x-show="pagination.total > 0">
                <div class="level-left">
                    <div class="level-item">
                        <span
                            class="tag is-info is-medium"
                            x-text="termCountLabel()"
                        ></span>
                    </div>
                </div>
                <div class="level-right">
                    <div class="level-item">
                        <span
                            class="has-text-grey is-size-7"
                            x-text="pageLabel()"
                        ></span>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- No results message -->
        <div x-show="!loading && words.length === 0" class="notification is-info is-light">
            <p>No terms found matching your filters.            <a href="/words/new">Create a new term</a>.</p>
        </div>
    
        <!-- Multi Actions Section -->
        <div x-show="!loading && words.length > 0" class="box mb-4">
            <div class="level is-mobile mb-3">
                <div class="level-left">
                    <div class="level-item">
                        <span class="icon-text">
                            <i data-lucide="zap" class="icon" title="Multi Actions" aria-label="Multi Actions" style="width:16px;height:16px"></i>                        <span class="has-text-weight-semibold ml-1">Multi Actions</span>
                        </span>
                    </div>
                </div>
            </div>
    
            <div class="field is-grouped is-grouped-multiline">
                <div class="control">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">
                                <strong>ALL</strong>&nbsp;<span
                                    x-text="termCountLabel()"
                                ></span>
                            </span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select @change="handleAllAction($event)">
                                    <option value="">[ Choose Action ]</option>
                                    <optgroup label="Status Changes">
                                        <option value="alls1">Set Status to 1</option>
                                        <option value="alls2">Set Status to 2</option>
                                        <option value="alls3">Set Status to 3</option>
                                        <option value="alls4">Set Status to 4</option>
                                        <option value="alls5">Set Status to 5</option>
                                        <option value="alls98">Set Status to Ignored</option>
                                        <option value="alls99">Set Status to Well Known</option>
                                        <option value="allspl1">Increment Status (+1)</option>
                                        <option value="allsmi1">Decrement Status (-1)</option>
                                    </optgroup>
                                    <optgroup label="Edits">
                                        <option value="alllower">Set to Lowercase</option>
                                        <option value="allcap">Capitalize</option>
                                        <option value="alladdtag">Add Tag</option>
                                        <option value="alldeltag">Remove Tag</option>
                                    </optgroup>
                                    <optgroup label="Danger Zone">
                                        <option value="alldel">Delete ALL</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    
            <div class="field is-grouped is-grouped-multiline mt-3">
                <div class="control">
                    <div class="buttons are-small">
                        <button type="button" class="button is-light" @click="markAll(true)">
                            <i data-lucide="check-check" class="icon" aria-label="Mark All" style="width:16px;height:16px"></i>                        <span class="ml-1">Mark All</span>
                        </button>
                        <button type="button" class="button is-light" @click="markAll(false)">
                            <i data-lucide="x" class="icon" aria-label="Mark None" style="width:16px;height:16px"></i>                        <span class="ml-1">Mark None</span>
                        </button>
                        <span
                            x-show="getMarkedCount() > 0"
                            class="tag is-warning ml-2"
                            x-text="markedCountLabel()"
                        ></span>
                    </div>
                </div>
                <div class="control">
                    <div class="field has-addons">
                        <div class="control">
                            <span class="button is-static is-small">Marked Terms</span>
                        </div>
                        <div class="control">
                            <div class="select is-small">
                                <select :disabled="getMarkedCount() === 0" @change="handleMultiAction($event)">
                                    <option value="">[ Choose Action ]</option>
                                    <optgroup label="Status Changes">
                                        <option value="s1">Set Status to 1</option>
                                        <option value="s2">Set Status to 2</option>
                                        <option value="s3">Set Status to 3</option>
                                        <option value="s4">Set Status to 4</option>
                                        <option value="s5">Set Status to 5</option>
                                        <option value="s98">Set Status to Ignored</option>
                                        <option value="s99">Set Status to Well Known</option>
                                        <option value="spl1">Increment Status (+1)</option>
                                        <option value="smi1">Decrement Status (-1)</option>
                                        <option value="today">Set Today's Date</option>
                                    </optgroup>
                                    <optgroup label="Edits">
                                        <option value="lower">Set to Lowercase</option>
                                        <option value="cap">Capitalize</option>
                                        <option value="delsent">Clear Sentences</option>
                                        <option value="addtag">Add Tag</option>
                                        <option value="deltag">Remove Tag</option>
                                    </optgroup>
                                    <optgroup label="Export">
                                        <option value="exp">Export (Anki)</option>
                                        <option value="exptsv">Export (TSV)</option>
                                    </optgroup>
                                    <optgroup label="Other">
                                        <option value="review">Review Selection</option>
                                    </optgroup>
                                    <optgroup label="Danger Zone">
                                        <option value="del">Delete Selected</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- Desktop Table View -->
        <div class="table-container is-hidden-mobile" x-show="!loading && words.length > 0">
            <table class="table is-striped is-hoverable is-fullwidth">
                <thead>
                    <tr>
                        <th class="has-text-centered" style="width: 3em;">Mark</th>
                        <th class="has-text-centered" style="width: 3em;">Act.</th>
                        <th>Term</th>
                        <th x-show="columns.romanization">Romanization</th>
                        <th x-show="columns.translation">Translation</th>
                        <th x-show="columns.tags">Tags</th>
                        <th class="has-text-centered" style="width: 6em;" x-show="columns.sentence">
                            Sentence</th>
                        <th class="has-text-centered" style="width: 5em;" x-show="columns.status">
                            Status</th>
                        <th class="has-text-centered" style="width: 5em;" x-show="columns.score">
                            Score</th>
                        <th
                            class="has-text-centered"
                            style="width: 7em;"
                            x-show="filters.sort === 7"
                            title="Word Count in Active Texts"
                        >Word count</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="word in words" :key="word.id">
                        <tr>
                            <!-- Checkbox -->
                            <td class="has-text-centered">
                                <input type="checkbox"
                                       class="markcheck"
                                       :checked="isMarked(word.id)"
                                       @change="toggleMark(word.id, $event.target.checked)" />
                            </td>
    
                            <!-- Actions -->
                            <td class="has-text-centered" style="white-space: nowrap;">
                                <div class="buttons are-small is-centered">
                                    <a
                                        :href="'/words/' + word.id + '/edit'"
                                        class="button is-small is-ghost"
                                        title="Edit"
                                    >
                                        <i data-lucide="file-pen-line" class="icon" title="Edit" aria-label="Edit" style="width:16px;height:16px"></i>                                </a>
                                </div>
                            </td>
    
                            <!-- Term -->
                            <td>
                                <span :class="word.ttsClass" :dir="word.rightToLeft ? 'rtl' : 'ltr'">
                                    <strong x-text="word.text"></strong>
                                </span>
                            </td>
    
                            <!-- Romanization -->
                            <td x-show="columns.romanization">
                                <template x-if="isEditing(word.id, 'romanization')">
                                    <span class="inline-edit-container">
                                        <textarea class="textarea is-small"
                                                  :data-edit-id="word.id"
                                                  data-edit-field="romanization"
                                                  x-model="editValue"
                                                  @keydown.escape="cancelEdit()"
                                                  @keydown.ctrl.enter="saveEdit()"
                                                  rows="1"></textarea>
                                        <div class="buttons are-small mt-1">
                                            <button type="button" class="button is-small is-success"
                                                @click="saveEdit()" :disabled="editSaving">
                                                <i data-lucide="check" class="icon" aria-label="Save" style="width:16px;height:16px"></i>                                        </button>
                                            <button type="button" class="button is-small" @click="cancelEdit()">
                                                <i data-lucide="x" class="icon" aria-label="Cancel" style="width:16px;height:16px"></i>                                        </button>
                                        </div>
                                    </span>
                                </template>
                                <template x-if="!isEditing(word.id, 'romanization')">
                                    <span class="clickedit"
                                          @click="startEdit(word.id, 'romanization')"
                                          x-text="getDisplayValue(word, 'romanization')"></span>
                                </template>
                            </td>
    
                            <!-- Translation -->
                            <td x-show="columns.translation">
                                <template x-if="isEditing(word.id, 'translation')">
                                    <span class="inline-edit-container">
                                        <textarea class="textarea is-small"
                                                  :data-edit-id="word.id"
                                                  data-edit-field="translation"
                                                  x-model="editValue"
                                                  @keydown.escape="cancelEdit()"
                                                  @keydown.ctrl.enter="saveEdit()"
                                                  rows="2"></textarea>
                                        <div class="buttons are-small mt-1">
                                            <button type="button" class="button is-small is-success"
                                                @click="saveEdit()" :disabled="editSaving">
                                                <i data-lucide="check" class="icon" aria-label="Save" style="width:16px;height:16px"></i>                                        </button>
                                            <button type="button" class="button is-small" @click="cancelEdit()">
                                                <i data-lucide="x" class="icon" aria-label="Cancel" style="width:16px;height:16px"></i>                                        </button>
                                        </div>
                                    </span>
                                </template>
                                <template x-if="!isEditing(word.id, 'translation')">
                                    <span class="clickedit"
                                          @click="startEdit(word.id, 'translation')"
                                          x-text="$markdown(getDisplayValue(word, 'translation'))"></span>
                                </template>
                            </td>
    
                            <!-- Tags -->
                            <td x-show="columns.tags">
                                <span class="has-text-grey is-size-7" x-text="word.tags"></span>
                            </td>
    
                            <!-- Sentence -->
                            <td class="has-text-centered" x-show="columns.sentence">
                                <template x-if="word.sentenceOk">
                                    <span class="has-text-success" :title="word.sentence">
                                        <i data-lucide="circle-check" class="icon" aria-label="Yes" style="width:16px;height:16px"></i>                                </span>
                                </template>
                                <template x-if="!word.sentenceOk">
                                    <span class="has-text-danger" title="No valid sentence">
                                        <i data-lucide="circle-x" class="icon" aria-label="No" style="width:16px;height:16px"></i>                                </span>
                                </template>
                            </td>
    
                            <!-- Status / Days -->
                            <td class="has-text-centered" x-show="columns.status" :title="word.statusLabel">
                                <span
                                    class="tag"
                                    :class="getStatusClass(word.status)"
                                    x-text="statusDisplay(word)"
                                ></span>
                            </td>
    
                            <!-- Score -->
                            <td class="has-text-centered" x-show="columns.score" style="white-space: nowrap;">
                                <span
                                    class="tag is-light"
                                    :class="getStatusClass(word.status)"
                                    x-text="formatScore(word.score)"
                                ></span>
                            </td>
    
                            <!-- Word count (for sort 7) -->
                            <td
                                class="has-text-centered"
                                x-show="filters.sort === 7"
                                x-text="word.textsWordCount || 0"
                            ></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    
        <!-- Mobile Card View -->
        <div class="is-hidden-tablet" x-show="!loading && words.length > 0">
            <template x-for="word in words" :key="word.id">
                <div class="card mb-3">
                    <div class="card-content">
                        <div class="level is-mobile mb-2">
                            <div class="level-left">
                                <div class="level-item">
                                    <label class="checkbox">
                                        <input type="checkbox"
                                               class="markcheck"
                                               :checked="isMarked(word.id)"
                                               @change="toggleMark(word.id, $event.target.checked)" />
                                    </label>
                                </div>
                                <div class="level-item">
                                    <span :class="word.ttsClass" :dir="word.rightToLeft ? 'rtl' : 'ltr'">
                                        <strong class="is-size-5" x-text="word.text"></strong>
                                    </span>
                                </div>
                            </div>
                            <div class="level-right">
                                <div class="level-item">
                                    <div class="tags has-addons mb-0">
                                        <span class="tag" :class="getStatusClass(word.status)" x-text="word.statusAbbr"></span>
                                        <span
                                            class="tag"
                                            :class="getStatusClass(word.status)"
                                            x-text="formatScore(word.score)"
                                        ></span>
                                    </div>
                                </div>
                            </div>
                        </div>
    
                        <!-- Romanization (if exists) -->
                        <p
                            x-show="word.romanization && word.romanization !== '*'"
                            class="has-text-grey is-size-7 mb-1"
                        >
                            <span
                                class="clickedit"
                                @click="startEdit(word.id, 'romanization')"
                                x-text="word.romanization"
                            ></span>
                        </p>
    
                        <!-- Translation -->
                        <p class="mb-2">
                            <!-- Inline edit for translation on mobile -->
                            <template x-if="isEditing(word.id, 'translation')">
                                <span class="inline-edit-container">
                                    <textarea class="textarea is-small"
                                              :data-edit-id="word.id"
                                              data-edit-field="translation"
                                              x-model="editValue"
                                              @keydown.escape="cancelEdit()"
                                              @keydown.ctrl.enter="saveEdit()"
                                              rows="2"></textarea>
                                    <div class="buttons are-small mt-1">
                                        <button
                                            type="button"
                                            class="button is-small is-success"
                                            @click="saveEdit()"
                                            :disabled="editSaving"
                                        >Save</button>
                                        <button
                                            type="button"
                                            class="button is-small"
                                            @click="cancelEdit()"
                                        >Cancel</button>
                                    </div>
                                </span>
                            </template>
                            <template x-if="!isEditing(word.id, 'translation')">
                                <span
                                    class="clickedit"
                                    @click="startEdit(word.id, 'translation')"
                                    x-text="$markdown(getDisplayValue(word, 'translation'))"
                                ></span>
                            </template>
                        </p>
    
                        <div class="is-flex is-justify-content-space-between is-align-items-center">
                            <div class="tags">
                                <span x-show="word.tags" class="tag is-light" x-text="word.tags"></span>
                                <template x-if="columns.sentence && word.sentenceOk">
                                    <span class="tag is-success is-light" :title="word.sentence">
                                        <i data-lucide="message-square" class="icon" aria-label="Has sentence" style="width:16px;height:16px"></i>                                </span>
                                </template>
                            </div>
                            <div class="buttons are-small">
                                <a :href="'/words/' + word.id + '/edit'" class="button is-small is-info is-light">
                                    <i data-lucide="file-pen-line" class="icon" aria-label="Edit" style="width:16px;height:16px"></i>                            </a>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    
        <!-- Pagination -->
        <nav class="level mt-4" x-show="!loading && pagination.total_pages > 1">
            <div class="level-left">
                <div class="level-item">
                    <span
                        class="tag is-info is-medium"
                        x-text="termCountLabel()"
                    ></span>
                </div>
            </div>
            <div class="level-right">
                <div class="level-item">
                    <div class="buttons">
                        <button type="button"
                                class="button is-small"
                                :disabled="isFirstPage()"
                                @click="goToPage(1)"
                                title="First page">
                            <i data-lucide="chevrons-left" class="icon" aria-label="First" style="width:16px;height:16px"></i>                    </button>
                        <button type="button"
                                class="button is-small"
                                :disabled="isFirstPage()"
                                @click="goToPrevPage()"
                                title="Previous page">
                            <i data-lucide="chevron-left" class="icon" aria-label="Previous" style="width:16px;height:16px"></i>                    </button>
                        <span
                            class="button is-static is-small"
                            x-text="paginationText()"
                        ></span>
                        <button type="button"
                                class="button is-small"
                                :disabled="isLastPage()"
                                @click="goToNextPage()"
                                title="Next page">
                            <i data-lucide="chevron-right" class="icon" aria-label="Next" style="width:16px;height:16px"></i>                    </button>
                        <button type="button"
                                class="button is-small"
                                :disabled="isLastPage()"
                                @click="goToLastPage()"
                                title="Last page">
                            <i data-lucide="chevrons-right" class="icon" aria-label="Last" style="width:16px;height:16px"></i>                    </button>
                    </div>
                </div>
            </div>
        </nav>
    </div>
    
    <!-- Config for Alpine - pass active language and per-page setting -->
    <script type="application/json" id="word-list-config">{"activeLanguageId":0,"perPage":50}</script>
    
    <style>
        .clickedit {
            cursor: pointer;
            border-bottom: 1px dotted #ccc;
        }
        .clickedit:hover {
            background-color: var(--bulma-scheme-main-bis, #f5f5f5);
        }
        .inline-edit-container {
            display: inline-block;
            min-width: 150px;
        }
        .inline-edit-container .textarea {
            min-height: 2em;
        }
    </style>
  </section>
  <script type="module" src="./words.ts"></script>
</body>
</html>
