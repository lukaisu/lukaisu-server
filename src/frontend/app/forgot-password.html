<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Forgot password</title>
  <!-- Mounts the Svelte `ForgotPasswordPage` island (forgot-password.ts), the
       guest "email me a reset link" screen. It posts to
       `POST /api/v1/auth/password/forgot` (always neutral success) and replaces
       the retired server-rendered `forgot_password.php` form; the server's
       GET /password/forgot 302s here. Guest layout; runtime config + CSRF token
       injected by BundleController. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-6-tablet is-5-desktop">
          <!-- Svelte 5 forgot-password island mount point (mounted by forgot-password.ts). -->
          <div id="forgot-password-root"></div>
        </div>
      </div>
    </div>
  </section>
  <script type="module" src="./forgot-password.ts"></script>
</body>
</html>
