<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — New term</title>
  <!-- Navbar + i18n only. Replaces the server-rendered new-term form
       (Vocabulary/Views/form_new.php), which did a native POST; this drives the
       API client directly so it creates the on-device term store offline
       (local-first) and posts to /api/v1/terms/standalone when server-backed. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <div id="navbar-root" data-navbar-root data-current-page="terms"></div>
  <section class="section">
    <div class="container" style="max-width: 48rem;">
      <h1 class="title is-4">New term</h1>

      <div id="wn-loading" class="notification is-info is-light">Loading…</div>
      <div id="wn-nolang" class="notification is-warning" style="display:none">
        No languages yet. <a href="/languages/new">Add a language</a> first.
      </div>

      <form id="word-new-form" novalidate style="display:none">
        <div class="field">
          <label class="label" for="wn-language">Language</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="wn-language"></select>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-text">Term</label>
          <div class="control">
            <input id="wn-text" class="input" type="text" placeholder="Word or expression" required />
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-status">Status</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="wn-status">
                <option value="1">1 – Learning (new)</option>
                <option value="2">2 – Learning</option>
                <option value="3">3 – Learning</option>
                <option value="4">4 – Learning</option>
                <option value="5">5 – Learned</option>
                <option value="99">Well-known</option>
                <option value="98">Ignored</option>
              </select>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-translation">Translation</label>
          <div class="control">
            <textarea id="wn-translation" class="textarea" rows="2"
                      placeholder="Meaning in your language"></textarea>
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-romanization">Romanization <span class="has-text-grey">(optional)</span></label>
          <div class="control">
            <input id="wn-romanization" class="input" type="text"
                   placeholder="Reading / pronunciation" />
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-lemma">Lemma <span class="has-text-grey">(optional)</span></label>
          <div class="control">
            <input id="wn-lemma" class="input" type="text"
                   placeholder="Dictionary / base form" />
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-sentence">Example sentence <span class="has-text-grey">(optional)</span></label>
          <div class="control">
            <textarea id="wn-sentence" class="textarea" rows="2"
                      placeholder="A sentence using this term"></textarea>
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-notes">Notes <span class="has-text-grey">(optional)</span></label>
          <div class="control">
            <textarea id="wn-notes" class="textarea" rows="2"></textarea>
          </div>
        </div>
        <div class="field">
          <label class="label" for="wn-tags">Tags <span class="has-text-grey">(optional, comma-separated)</span></label>
          <div class="control">
            <input id="wn-tags" class="input" type="text" placeholder="e.g. verb, chapter-1" />
          </div>
        </div>
        <p id="wn-error" class="help is-danger" style="display:none"></p>
        <div class="field is-grouped mt-4">
          <div class="control">
            <button id="wn-submit" class="button is-primary" type="submit">Create term</button>
          </div>
          <div class="control">
            <a class="button is-light" href="/words">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </section>
  <script type="module" src="./word-new.ts"></script>
</body>
</html>
