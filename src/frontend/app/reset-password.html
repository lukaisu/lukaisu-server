<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Reset password</title>
  <!-- Mounts the Svelte `ResetPasswordPage` island (reset-password.ts), the
       guest "set a new password with an emailed token" screen. It reads `?token=`
       and posts to `POST /api/v1/auth/password/reset`, replacing the retired
       server-rendered `reset_password.php` form; the server's GET /password/reset
       302s here (carrying the token query). Guest layout; runtime config + CSRF
       token injected by BundleController. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-6-tablet is-5-desktop">
          <!-- Svelte 5 reset-password island mount point (mounted by reset-password.ts). -->
          <div id="reset-password-root"></div>
        </div>
      </div>
    </div>
  </section>
  <script type="module" src="./reset-password.ts"></script>
</body>
</html>
