<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Book</title>
  <!-- Mounts the Svelte BookDetailPage island. Server-enhanced: the book entity
       (chapters, progress) lives on a connected Lukaisu Server, so this page is
       gated. Offline (local-first, no server) book.ts reveals the notice below
       and does NOT mount the island. /book/{id} 302s here. -->
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar. -->
  <div id="navbar-root" data-navbar-root data-current-page="books"></div>
  <section class="section pt-4">
    <!-- No-server placeholder. book.ts un-hides this (and skips mounting the
         island) when local-first; hidden in server-backed modes. -->
    <div id="book-offline" class="notification is-info is-light" hidden>
      <h2 class="title is-5">
        <span class="icon"><i data-lucide="book-open"></i></span>
        Books need a connected server
      </h2>
      <p class="block">
        Imported books and their chapters live on a Lukaisu Server, so this page
        lights up once you connect one. Reading, saving words and reviewing keep
        working offline.
      </p>
      <button id="book-connect" type="button" class="button is-primary">
        <span class="icon"><i data-lucide="server"></i></span>
        <span>Connect a server</span>
      </button>
    </div>

    <!-- Svelte BookDetailPage island mount point. -->
    <div id="book-root"></div>
  </section>
  <script type="module" src="./book.ts"></script>
</body>
</html>
