<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Connect</title>
  <!-- No `lukaisu-modules` meta: the Svelte `ConnectPage` island (mounted by
       connect.ts) is the sole renderer of the connect/login/register flow here.
       The Alpine `clientAuth` renderer was retired, so no Alpine module loads. -->
  <meta name="lukaisu-modules" content="" />
  <style>
    [x-cloak]{display:none !important}
    [hidden]{display:none !important}
    /* First-run / launch splash. Self-contained styles: in the local-first
       redirect path the app CSS bundle never loads, so this must stand alone. */
    .entry-splash{
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:1.1rem;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      color:#363636; background:#fff;
    }
    @media (prefers-color-scheme: dark){
      .entry-splash{ color:#f5f5f5; background:#1b1b1f; }
    }
    .entry-splash__brand{ font-size:2rem; font-weight:700; letter-spacing:.01em; }
    .entry-splash__hint{ font-size:.95rem; opacity:.7; }
    .entry-splash__spinner{
      width:2rem; height:2rem; border-radius:50%;
      border:3px solid currentColor; border-right-color:transparent;
      opacity:.55; animation:entry-splash-spin .8s linear infinite;
    }
    @keyframes entry-splash-spin{ to{ transform:rotate(360deg); } }
    @media (prefers-reduced-motion: reduce){ .entry-splash__spinner{ animation:none; } }
  </style>
</head>
<body>
  <!-- Neutral launch splash, shown by default. On first run (no server) the app
       seeds the on-device DB and redirects straight to the library, so the
       connect/auth UI below never flashes. connect.ts reveals that UI only when
       actually connecting a server (?connect, or resuming a configured one). -->
  <div id="entry-splash" class="entry-splash" role="status" aria-live="polite">
    <div class="entry-splash__brand">Lukaisu</div>
    <div class="entry-splash__spinner" aria-hidden="true"></div>
    <div class="entry-splash__hint">Loading your library…</div>
  </div>

  <section id="connect-ui" class="section" hidden>
    <div class="container">
    <div class="columns is-centered">
        <div class="column is-6-tablet is-5-desktop">
            <!-- Svelte 5 connect/auth island (mounted by connect.ts) — the sole
                 renderer of the connect/login/register flow. It replaced the
                 retired Alpine `clientAuth` x-data `.box` region (the Alpine
                 component + its `client_auth.php` view are gone). -->
            <div id="connect-root"></div>
        </div>
    </div>
</div>

<script type="application/json" id="client-auth-config">
{}
</script>
  </section>
  <script type="module" src="./connect.ts"></script>
</body>
</html>
