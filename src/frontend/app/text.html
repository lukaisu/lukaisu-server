<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Add a text</title>
  <!-- Navbar + i18n only. No legacy feature module: the server-rendered text
       form does a native POST (and bundles server-only importers); this drives
       the API client directly. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <div id="navbar-root" data-navbar-root data-current-page="texts"></div>
  <section class="section">
    <div class="container" style="max-width: 48rem;">
      <h1 class="title is-4">Add a text</h1>

      <!-- Shown when there is no language yet: a text needs one to parse into. -->
      <div id="nt-no-lang" class="notification is-info" style="display:none">
        You need a language first.
        <a href="/languages/new">Add a language</a> to start reading.
      </div>

      <form id="new-text-form" novalidate>
        <div class="field">
          <label class="label" for="nt-lang">Language</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="nt-lang"></select>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="nt-title">Title</label>
          <div class="control">
            <input id="nt-title" class="input" type="text" required placeholder="Give your text a title" />
          </div>
        </div>
        <div class="field">
          <label class="label" for="nt-text">Text</label>
          <div class="control">
            <textarea id="nt-text" class="textarea" rows="10" required
                      placeholder="Paste or type the text you want to read…"></textarea>
          </div>
        </div>
        <div class="field">
          <label class="label" for="nt-tags">Tags <span class="has-text-grey">(optional, comma-separated)</span></label>
          <div class="control">
            <input id="nt-tags" class="input" type="text" placeholder="e.g. news, beginner" />
          </div>
        </div>
        <p id="nt-error" class="help is-danger" style="display:none"></p>
        <div class="field is-grouped mt-4">
          <div class="control">
            <button id="nt-submit" class="button is-primary" type="submit">Create &amp; read</button>
          </div>
          <div class="control">
            <a class="button is-light" href="/texts">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </section>
  <script type="module" src="./text.ts"></script>
</body>
</html>
