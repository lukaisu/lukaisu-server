<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Recover with a code</title>
  <!-- Mounts the Svelte `RecoverPasswordPage` island (recover-password.ts), the
       guest "reset with a one-time recovery code" screen (for email-less
       accounts). It posts to `POST /api/v1/auth/password/recover`, which rotates
       and returns a new recovery code, replacing the retired server-rendered
       `recover_password.php` form; the server's GET /password/recover 302s here.
       Guest layout; runtime config + CSRF token injected by BundleController. -->
  <meta name="lukaisu-modules" content="" />
  <style>[x-cloak]{display:none !important}[hidden]{display:none !important}</style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-6-tablet is-5-desktop">
          <!-- Svelte 5 recover-password island mount point (mounted by recover-password.ts). -->
          <div id="recover-password-root"></div>
        </div>
      </div>
    </div>
  </section>
  <script type="module" src="./recover-password.ts"></script>
</body>
</html>
