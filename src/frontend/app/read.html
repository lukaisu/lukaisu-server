<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Read</title>
  <meta name="lukaisu-modules" content="vocabulary,text,review,language" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <!-- Body prerendered at build time from the server's reader view (navbar
       mount point, toolbar, audio player, word popover/modal, multi-word modal
       — all inlined). The #navbar-root is hydrated from GET /api/v1/navbar. -->
  <!-- Main navigation -->
<div id="navbar-root" data-navbar-root data-current-page="texts"></div>

<div x-data="textReader" class="reading-page" x-cloak>
  <!-- Reading toolbar -->
  <div class="box py-2 px-4 mb-0" style="border-radius: 0;">
    <div class="level is-mobile">
      <div class="level-left">
        <div class="level-item">
          <strong x-text="title || 'Loading...'"></strong>
          
                
            
        </div>
      </div>
      <div class="level-right">
        <div class="level-item">
          <div class="field is-grouped is-grouped-multiline">
            <div class="control">
              <a href="/review?text={{TEXT_ID}}"
                class="button is-small">Review</a>
            </div>
            <div class="control">
              <a href="/texts/{{TEXT_ID}}/edit"
                class="button is-small">Edit</a>
            </div>
            <!-- Display settings dropdown -->
            <div class="control">
              <div class="dropdown is-hoverable is-right">
                <div class="dropdown-trigger">
                  <button class="button is-small">
                    <span class="icon is-small">
                      <i data-lucide="sliders"
                        style="width:14px;height:14px"></i>
                    </span>
                    <span>Display</span>
                  </button>
                </div>
                <div class="dropdown-menu" style="min-width:220px">
                  <div class="dropdown-content">
                    <!-- Toggles -->
                    <a class="dropdown-item"
                      @click.prevent="toggleShowAll()">
                      <span class="icon is-small mr-2">
                        <i x-show="showAll" data-lucide="square-check-big"
                          style="width:14px;height:14px"></i>
                        <i x-show="!showAll" data-lucide="square"
                          style="width:14px;height:14px"></i>
                      </span>
                      Multi-word expressions
                    </a>
                    <a class="dropdown-item"
                      @click.prevent="toggleTranslations()">
                      <span class="icon is-small mr-2">
                        <i x-show="showTranslations"
                          data-lucide="square-check-big"
                          style="width:14px;height:14px"></i>
                        <i x-show="!showTranslations"
                          data-lucide="square"
                          style="width:14px;height:14px"></i>
                      </span>
                      Translations
                    </a>
                    <hr class="dropdown-divider">
                    <!-- Text size -->
                    <div class="dropdown-item">
                      <label class="label is-small mb-1">
                        Text size
                      </label>
                      <div class="field has-addons">
                        <p class="control">
                          <button class="button is-small"
                            @click="decreaseTextSize()">
                            <span class="icon is-small">
                              <i data-lucide="minus"
                                style="width:12px;height:12px">
                              </i>
                            </span>
                          </button>
                        </p>
                        <p class="control">
                          <span class="button is-small is-static"
                            x-text="readerTextSize + '%'"
                            style="min-width:3.5em">
                          </span>
                        </p>
                        <p class="control">
                          <button class="button is-small"
                            @click="increaseTextSize()">
                            <span class="icon is-small">
                              <i data-lucide="plus"
                                style="width:12px;height:12px">
                              </i>
                            </span>
                          </button>
                        </p>
                      </div>
                    </div>
                    <!-- Reader width -->
                    <div class="dropdown-item">
                      <label class="label is-small mb-1">
                        Reading width
                      </label>
                      <input type="range" min="40" max="100"
                        step="5"
                        x-model.number="readerWidth"
                        @input="onReaderWidthChange()"
                        style="width:100%"
                        title="Reading area width">
                    </div>
                    <hr class="dropdown-divider">
                    <!-- Print -->
                    <a class="dropdown-item"
                      href="/text/{{TEXT_ID}}/print-plain">
                      <span class="icon is-small mr-2">
                        <i data-lucide="printer"
                          style="width:14px;height:14px"></i>
                      </span>
                      Print
                    </a>
                  </div>
                </div>
              </div>
            </div>
            <!-- Actions dropdown -->
            <div class="control">
              <div class="dropdown is-hoverable is-right">
                <div class="dropdown-trigger">
                  <button class="button is-small">Actions</button>
                </div>
                <div class="dropdown-menu">
                  <div class="dropdown-content">
                    <a class="dropdown-item"
                      @click.prevent="markAllWellKnown()">
                      Mark all Well Known
                    </a>
                    <a class="dropdown-item"
                      @click.prevent="markAllIgnored()">
                      Mark all Ignored
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Audio player: markup-only; the audioPlayer component fetches
       /texts/{id}/audio and reveals itself only when the text has audio. -->
  <div class="box py-2 px-4 mb-0" style="border-radius: 0;"
     x-data="audioPlayer" x-show="hasAudio" x-cloak>
  <div class="audio-player-container">
    <!-- Source + offset + settings are set by the component from the API -->
    <audio preload="auto"></audio>

    <div class="audio-player">
      <!-- Play/Pause/Stop controls -->
      <div class="audio-player-controls">
        <button type="button" class="button is-small"
                :class="isPlaying ? 'is-primary' : 'is-light'"
                @click="togglePlay" :title="isPlaying ? 'Pause' : 'Play'">
          <i data-lucide="play" class="icon" style="width:16px;height:16px"></i>
          <i data-lucide="pause" class="icon" style="width:16px;height:16px"></i>
        </button>
        <button type="button" class="button is-small is-light" @click="stop" title="Stop">
          <i data-lucide="square" class="icon" style="width:16px;height:16px"></i>
        </button>
      </div>

      <!-- Progress section -->
      <div class="audio-player-progress">
        <div class="progress-bar-container" @click="seekFromEvent($event)" title="Click to seek">
          <div class="progress-bar" :style="{ width: progressPercent + '%' }"></div>
        </div>
        <div class="time-display">
          <span x-text="currentTimeFormatted">0:00</span>
          <span class="has-text-grey-light">/</span>
          <span x-text="durationFormatted">0:00</span>
        </div>
      </div>

      <!-- Volume control -->
      <div class="audio-player-volume">
        <button type="button" class="button is-small is-light"
                @click="toggleMute" :title="isMuted ? 'Unmute' : 'Mute'">
          <i data-lucide="volume-2" class="icon" style="width:16px;height:16px"></i>
          <i data-lucide="volume-1" class="icon" style="width:16px;height:16px"></i>
          <i data-lucide="volume-x" class="icon" style="width:16px;height:16px"></i>
        </button>
        <div class="volume-bar-container" @click="setVolumeFromEvent($event)" title="Adjust volume">
          <div class="volume-bar" :style="{ width: (isMuted ? 0 : volume * 100) + '%' }"></div>
        </div>
      </div>

      <!-- Skip controls -->
      <div class="audio-player-skip">
        <button type="button" class="button is-small is-light"
                @click="skipBackward" :title="'Skip back ' + skipSeconds + 's'">
          <i data-lucide="skip-back" class="icon" style="width:16px;height:16px"></i>
        </button>
        <div class="dropdown is-hoverable is-up">
          <div class="dropdown-trigger">
            <button type="button" class="button is-small is-light" aria-haspopup="true">
              <span x-text="skipSeconds + 's'" class="is-size-7"></span>
            </button>
          </div>
          <div class="dropdown-menu" role="menu">
            <div class="dropdown-content">
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 1 }"
                 @click="setSkipSeconds(1)">1s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 2 }"
                 @click="setSkipSeconds(2)">2s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 3 }"
                 @click="setSkipSeconds(3)">3s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 4 }"
                 @click="setSkipSeconds(4)">4s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 5 }"
                 @click="setSkipSeconds(5)">5s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 10 }"
                 @click="setSkipSeconds(10)">10s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 15 }"
                 @click="setSkipSeconds(15)">15s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 20 }"
                 @click="setSkipSeconds(20)">20s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 25 }"
                 @click="setSkipSeconds(25)">25s</a>
              
              <a class="dropdown-item is-size-7"
                 :class="{ 'is-active': skipSeconds === 30 }"
                 @click="setSkipSeconds(30)">30s</a>
              
            </div>
          </div>
        </div>
        <button type="button" class="button is-small is-light"
                @click="skipForward" :title="'Skip forward ' + skipSeconds + 's'">
          <i data-lucide="skip-forward" class="icon" style="width:16px;height:16px"></i>
        </button>
      </div>

      <!-- Speed controls -->
      <div class="audio-player-speed">
        <button type="button" class="button is-small is-light"
                @click="slower" title="Slower" :disabled="playbackRate <= 0.5">
          <i data-lucide="minus" class="icon" style="width:14px;height:14px"></i>
        </button>
        <button type="button" class="button is-small"
                :class="playbackRate === 1.0 ? 'is-light' : 'is-warning'"
                @click="resetSpeed" title="Reset to 1x speed">
          <span x-text="playbackRateFormatted" class="is-size-7"></span>
        </button>
        <button type="button" class="button is-small is-light"
                @click="faster" title="Faster" :disabled="playbackRate >= 1.5">
          <i data-lucide="plus" class="icon" style="width:14px;height:14px"></i>
        </button>
      </div>

      <!-- Repeat toggle -->
      <div class="audio-player-repeat">
        <button type="button" class="button is-small"
                :class="repeatMode ? 'is-info' : 'is-light'"
                @click="toggleRepeat" :title="repeatMode ? 'Repeat: ON' : 'Repeat: OFF'">
          <i data-lucide="repeat" class="icon" style="width:16px;height:16px"></i>
        </button>
      </div>
    </div>
  </div>
</div>

  <!-- Chapter navigation: client-rendered from /texts/{id}/book-context
       (book_nav_renderer.ts) so the reader carries no server-rendered chrome.
       Stays empty for a standalone text. -->
  <div id="book-context-nav"></div>

  <!-- Loading state -->
  <div x-show="isLoading" class="has-text-centered py-6">
    <div class="loading-spinner"></div>
    <p class="mt-4 has-text-grey">Loading text...</p>
  </div>

  <!-- Error state -->
  <template x-if="error">
    <div class="notification is-danger mx-4 mt-4">
      <button class="delete" @click="error = null"></button>
      <p x-text="error"></p>
    </div>
  </template>

  <!-- Status message (mark-all feedback) -->
  <template x-if="statusMessage">
    <div class="notification is-info is-light mx-4 mt-2 py-2 px-4">
      <button class="delete is-small" @click="statusMessage = null"></button>
      <span x-text="statusMessage"></span>
    </div>
  </template>

  <!-- Text content -->
  <div x-show="!isLoading && !error" class="reading-content p-4">
    <div
      id="thetext"
      class="content"
      :class="{ 'hide-translations': !showTranslations }"
      :style="store.rightToLeft ? 'direction: rtl' : ''"
    >
      <!-- Content rendered by JavaScript via textReader.renderTextContent() -->
    </div>
  </div>

  <!-- Word popover (info view - non-blocking) -->
  <div x-data="wordPopover" x-cloak>
  <!-- Popover container - positioned absolutely near the target word -->
  <div
    class="word-popover"
    role="dialog"
    aria-label="Word details"
    x-show="isOpen"
    :style="getPositionStyle()"
    :class="'word-popover--' + position.placement"
    x-transition:enter="popover-enter"
    x-transition:enter-start="popover-enter-start"
    x-transition:enter-end="popover-enter-end"
    x-transition:leave="popover-leave"
    x-transition:leave-start="popover-leave-start"
    x-transition:leave-end="popover-leave-end"
  >
    <!-- Arrow indicator -->
    <div class="word-popover__arrow" :class="'word-popover__arrow--' + position.placement"></div>

    <!-- Popover content -->
    <div class="word-popover__content">
      <!-- Loading state -->
      <div x-show="isLoading" class="has-text-centered py-2">
        <span class="icon">
          <i data-lucide="loader-2" class="icon-spin" style="width:16px;height:16px" aria-hidden="true"></i>
        </span>
      </div>

      <template x-if="word && !isLoading">
        <div>
          <!-- Word text and audio button -->
          <div class="is-flex is-justify-content-space-between is-align-items-center mb-2">
            <span class="is-size-5 has-text-weight-bold" x-text="wordText"></span>
            <button class="button is-small is-rounded is-ghost" @click="speakWord" title="Listen">
              <i data-lucide="volume-2" class="icon" style="width:14px;height:14px"></i>
            </button>
          </div>

          <!-- Translation for known words -->
          <template x-if="hasTranslation">
            <div class="mb-2">
              <p class="is-size-7 word-popover__translation" x-text="wordTranslation"></p>
              <template x-if="hasRomanization">
                <p class="is-size-7 word-popover__romanization" x-text="wordRomanization"></p>
              </template>
            </div>
          </template>

          <!-- Status actions for known words. Learning level 1-5 is derived
               from FSRS (read-only); only Learning / Well-known / Ignored are
               settable (issue #238). -->
          <template x-if="!isUnknown">
            <div class="mb-2">
              <div class="buttons are-small mb-0">
                <button
                  class="button"
                  :class="getStatusButtonClass(1)"
                  :disabled="isLoading"
                  @click="setStatus(1)"
                >Learning</button>
                <button
                  class="button"
                  :class="isCurrentStatus(99) ? 'is-success' : 'is-outlined is-success'"
                  :disabled="isLoading"
                  @click="setStatus(99)"
                >Known</button>
                <button
                  class="button"
                  :class="isCurrentStatus(98) ? 'is-warning' : 'is-outlined is-warning'"
                  :disabled="isLoading"
                  @click="setStatus(98)"
                >Ignore</button>
              </div>
            </div>
          </template>

          <!-- Quick actions for unknown words -->
          <template x-if="isUnknown">
            <div class="mb-2">
              <div class="buttons are-small mb-0">
                <button class="button is-success is-small" :disabled="isLoading" @click="markWellKnown">
                  <i data-lucide="check" class="icon" style="width:12px;height:12px"></i>
                  <span class="ml-1">Known</span>
                </button>
                <button class="button is-warning is-small" :disabled="isLoading" @click="markIgnored">
                  <i data-lucide="x" class="icon" style="width:12px;height:12px"></i>
                  <span class="ml-1">Ignore</span>
                </button>
              </div>
            </div>
          </template>

          <!-- Action row -->
          <div class="is-flex is-justify-content-space-between is-align-items-center pt-2 word-popover__actions">
            <div class="buttons are-small mb-0">
              <!-- Edit button -->
              <button class="button is-info is-outlined is-small" @click="openEditForm" :disabled="isLoading">
                <i data-lucide="edit" class="icon" style="width:12px;height:12px"></i>
                <span class="ml-1" x-text="wordLabel"></span>
              </button>
              <!-- Delete button for known words -->
              <template x-if="!isUnknown && hasWordId">
                <button class="button is-danger is-outlined is-small" :disabled="isLoading" @click="deleteWord">
                  <i data-lucide="trash-2" class="icon" style="width:12px;height:12px"></i>
                </button>
              </template>
            </div>

            <!-- Dictionary links -->
            <div class="buttons are-small mb-0">
              <a x-show="hasDictUrl('dict1')" :href="getDictUrl('dict1')" target="_blank"
                 class="button is-link is-outlined is-small" rel="noopener" title="Dictionary 1">
                Dict 1
              </a>
              <a x-show="hasDictUrl('dict2')" :href="getDictUrl('dict2')" target="_blank"
                 class="button is-link is-outlined is-small" rel="noopener" title="Dictionary 2">
                Dict 2
              </a>
              <a x-show="hasDictUrl('translator')" :href="getDictUrl('translator')" target="_blank"
                 class="button is-link is-outlined is-small" rel="noopener" title="Translate">
                <i data-lucide="languages" class="icon" style="width:12px;height:12px"></i>
              </a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

  <!-- Word modal (edit view only) -->
  <div x-data="wordModal" x-cloak>
  <div
    class="modal"
    :class="{ 'is-active': isOpen }"
    role="dialog"
    aria-modal="true"
    aria-labelledby="word-modal-title">
    <div class="modal-background" @click="close"></div>
    <div class="modal-card" style="max-width: 500px;">
      <header class="modal-card-head py-3">
        <p class="modal-card-title is-size-6" id="word-modal-title" x-text="modalTitle"></p>
        <button
          class="delete"
          aria-label="Close dialog"
          @click="close"
          :disabled="isLoading"></button>
      </header>
      <section class="modal-card-body">
        <!-- Loading overlay -->
        <div x-show="isLoading" class="has-text-centered py-4">
          <span class="icon is-large">
            <i data-lucide="loader-2" class="icon-spin" style="width:24px;height:24px" aria-hidden="true"></i>
          </span>
          <p class="mt-2">Loading...</p>
        </div>

        <!-- INFO VIEW -->
        <template x-if="viewMode === 'info' && word && !isLoading">
          <div>
            <!-- Word text and audio -->
            <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
              <span class="is-size-4 has-text-weight-bold" x-text="wordText"></span>
              <button class="button is-small is-rounded" @click="speakWord" title="Listen">
                <i data-lucide="volume-2" class="icon" style="width:16px;height:16px"></i>
              </button>
            </div>

            <!-- Translation/Romanization for known words -->
            <template x-if="hasTranslation">
              <div class="mb-3">
                <p class="has-text-grey-dark" x-text="$markdown(wordTranslation)"></p>
                <template x-if="hasRomanization">
                  <p class="is-size-7 has-text-grey" x-text="wordRomanization"></p>
                </template>
              </div>
            </template>

            <!-- Notes for known words -->
            <template x-if="hasNotes">
              <div class="mb-3">
                <p class="is-size-7 has-text-grey mb-1">Notes:</p>
                <p class="has-text-grey-dark is-size-7" x-text="$markdown(wordNotes)"></p>
              </div>
            </template>

            <!-- Tags if present -->
            <template x-if="hasTags">
              <div class="mb-3">
                <span class="tag is-info is-light" x-text="wordTags"></span>
              </div>
            </template>

            <!-- Status actions for known words. Learning level 1-5 is derived
                 from FSRS (read-only); only Learning / Well-known / Ignored are
                 settable (issue #238). -->
            <template x-if="!isUnknown">
              <div class="mb-4">
                <p class="is-size-7 has-text-grey mb-2">Status:</p>
                <div class="buttons are-small">
                  <button
                    class="button"
                    :class="getStatusButtonClass(1)"
                    :disabled="isLoading"
                    @click="setStatus(1)"
                  >Learning</button>
                  <button
                    class="button"
                    :class="isCurrentStatus(99) ? 'is-success' : 'is-outlined is-success'"
                    :disabled="isLoading"
                    @click="setStatus(99)"
                  >Well Known</button>
                  <button
                    class="button"
                    :class="isCurrentStatus(98) ? 'is-warning' : 'is-outlined is-warning'"
                    :disabled="isLoading"
                    @click="setStatus(98)"
                  >Ignored</button>
                </div>
              </div>
            </template>

            <!-- Quick actions for unknown words -->
            <template x-if="isUnknown">
              <div class="mb-4">
                <p class="is-size-7 has-text-grey mb-2">Quick actions:</p>
                <div class="buttons">
                  <button class="button is-success" :disabled="isLoading" @click="markWellKnown">
                    <i data-lucide="check" class="icon" style="width:16px;height:16px"></i>
                    <span class="ml-1">I know this well</span>
                  </button>
                  <button class="button is-warning" :disabled="isLoading" @click="markIgnored">
                    <i data-lucide="x" class="icon" style="width:16px;height:16px"></i>
                    <span class="ml-1">Ignore</span>
                  </button>
                </div>
              </div>
            </template>

            <!-- Edit/Delete for known words -->
            <template x-if="!isUnknown && hasWordId">
              <div class="mb-4">
                <div class="buttons are-small">
                  <button class="button is-info is-outlined" @click="showEditForm" :disabled="isLoading">
                    <i data-lucide="edit" class="icon" style="width:14px;height:14px"></i>
                    <span class="ml-1">Edit</span>
                  </button>
                  <button class="button is-danger is-outlined" :disabled="isLoading" @click="deleteWord">
                    <i data-lucide="trash-2" class="icon" style="width:14px;height:14px"></i>
                    <span class="ml-1">Delete</span>
                  </button>
                </div>
              </div>
            </template>

            <!-- Edit link for unknown words -->
            <template x-if="isUnknown">
              <div class="mb-4">
                <button class="button is-info" @click="showEditForm" :disabled="isLoading">
                  <i data-lucide="edit" class="icon" style="width:16px;height:16px"></i>
                  <span class="ml-1">Add with translation</span>
                </button>
              </div>
            </template>

            <!-- Dictionary links -->
            <template x-if="hasDictUrl('dict1') || hasDictUrl('dict2') || hasDictUrl('translator')">
            <div class="pt-3" style="border-top: 1px solid #dbdbdb;">
              <p class="is-size-7 has-text-grey mb-2">Lookup:</p>
              <div class="buttons are-small">
                <a
                  x-show="hasDictUrl('dict1')"
                  :href="getDictUrl('dict1')"
                  target="_blank"
                  class="button is-outlined is-link"
                  rel="noopener">
                  <i data-lucide="book-open" class="icon" style="width:14px;height:14px"></i>
                  <span class="ml-1">Dict 1</span>
                </a>
                <a
                  x-show="hasDictUrl('dict2')"
                  :href="getDictUrl('dict2')"
                  target="_blank"
                  class="button is-outlined is-link"
                  rel="noopener">
                  <i data-lucide="book-open" class="icon" style="width:14px;height:14px"></i>
                  <span class="ml-1">Dict 2</span>
                </a>
                <a
                  x-show="hasDictUrl('translator')"
                  :href="getDictUrl('translator')"
                  target="_blank"
                  class="button is-outlined is-link"
                  rel="noopener">
                  <i data-lucide="languages" class="icon" style="width:14px;height:14px"></i>
                  <span class="ml-1">Translate</span>
                </a>
              </div>
            </div>
            </template>
          </div>
        </template>

        <!-- EDIT VIEW -->
        <template x-if="viewMode === 'edit' && !isLoading">
          <div x-data="wordEditForm">
            <!-- General error message -->
            <template x-if="hasGeneralError">
              <div class="notification is-danger is-light mb-4">
                <button class="delete" @click="clearGeneralError()"></button>
                <span x-text="generalError"></span>
              </div>
            </template>

            <!-- Term (read-only) -->
            <div class="field">
              <label class="label is-small">Term</label>
              <div class="control">
                <input class="input" type="text" :value="formText" disabled>
              </div>
            </div>

            <!-- Translation -->
            <div class="field">
              <label class="label is-small">
                Translation <span class="has-text-danger">*</span>
              </label>
              <div class="control">
                <textarea
                  class="textarea"
                  :class="{ 'is-danger': hasFieldError('translation') }"
                  x-model="translation"
                  @blur="validateField('translation')"
                  rows="2"
                  placeholder="Enter translation..."
                ></textarea>
              </div>
              <template x-if="hasFieldError('translation')">
                <p class="help is-danger" x-text="getFieldError('translation')"></p>
              </template>
            </div>

            <!-- Romanization (if enabled for language) -->
            <template x-if="showRomanization">
              <div class="field">
                <label class="label is-small">Romanization</label>
                <div class="control">
                  <input
                    class="input"
                    :class="{ 'is-danger': hasFieldError('romanization') }"
                    type="text"
                    x-model="romanization"
                    @blur="validateField('romanization')"
                    placeholder="Enter romanization..."
                  >
                </div>
                <template x-if="hasFieldError('romanization')">
                  <p class="help is-danger" x-text="getFieldError('romanization')"></p>
                </template>
              </div>
            </template>

            <!-- Sentence -->
            <div class="field">
              <label class="label is-small">Example Sentence</label>
              <div class="control">
                <textarea
                  class="textarea"
                  :class="{ 'is-danger': hasFieldError('sentence') }"
                  x-model="sentence"
                  @blur="validateField('sentence')"
                  rows="2"
                  placeholder="Example sentence with {term} in braces..."
                ></textarea>
              </div>
              <template x-if="hasFieldError('sentence')">
                <p class="help is-danger" x-text="getFieldError('sentence')"></p>
              </template>
              <p class="help">Use {curly braces} around the term</p>
            </div>

            <!-- Notes -->
            <div class="field">
              <label class="label is-small">Notes</label>
              <div class="control">
                <textarea
                  class="textarea"
                  :class="{ 'is-danger': hasFieldError('notes') }"
                  x-model="notes"
                  @blur="validateField('notes')"
                  rows="2"
                  placeholder="Personal notes about this term..."
                ></textarea>
              </div>
              <template x-if="hasFieldError('notes')">
                <p class="help is-danger" x-text="getFieldError('notes')"></p>
              </template>
            </div>

            <!-- Status -->
            <div class="field">
              <label class="label is-small">Status</label>
              <div class="buttons are-small">
                <template x-for="s in statuses" :key="s.value">
                  <button
                    type="button"
                    class="button"
                    :class="getStatusButtonClass(s.value)"
                    @click="setFormStatus(s.value)"
                    x-text="s.abbr"
                  ></button>
                </template>
              </div>
            </div>

            <!-- Tags -->
            <div class="field">
              <label class="label is-small">Tags</label>
              <div class="control">
                <!-- Current tags -->
                <div class="tags mb-2" x-show="hasTags">
                  <template x-for="tag in formTags" :key="tag">
                    <span class="tag is-info is-light">
                      <span x-text="tag"></span>
                      <button type="button" class="delete is-small" @click="removeTag(tag)"></button>
                    </span>
                  </template>
                </div>
                <!-- Tag input with autocomplete -->
                <div class="dropdown" :class="{ 'is-active': showTagSuggestions }">
                  <div class="dropdown-trigger" style="width: 100%;">
                    <input
                      class="input is-small"
                      type="text"
                      x-model="tagInput"
                      @input="filterTags"
                      @keydown.enter.prevent="addTag(tagInput)"
                      @blur="hideTagSuggestions"
                      placeholder="Add tag..."
                    >
                  </div>
                  <div class="dropdown-menu" role="menu" style="width: 100%;">
                    <div class="dropdown-content">
                      <template x-for="tag in filteredTags" :key="tag">
                        <a href="#" class="dropdown-item"
                           @mousedown.prevent="selectTagSuggestion(tag)" x-text="tag"></a>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Similar Terms -->
            <template x-if="hasSimilarTerms">
              <div class="field">
                <label class="label is-small">Similar Terms</label>
                <div class="is-size-7">
                  <template x-for="term in formSimilarTerms" :key="term.id">
                    <div class="is-flex is-justify-content-space-between is-align-items-center py-1"
                         style="border-bottom: 1px solid #f0f0f0;">
                      <div>
                        <span class="has-text-weight-semibold" x-text="term.text"></span>
                        <span class="has-text-grey" x-text="getSimilarTermDisplay(term)"></span>
                      </div>
                      <button
                        type="button"
                        class="button is-small is-ghost"
                        @click="copyFromSimilar(term)"
                        title="Copy translation"
                        x-show="term.translation"
                      >
                        <i data-lucide="copy" class="icon" style="width:12px;height:12px"></i>
                      </button>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Action buttons -->
            <div class="field is-grouped mt-5">
              <div class="control">
                <button
                  type="button"
                  class="button is-primary"
                  :class="{ 'is-loading': isSubmitting }"
                  :disabled="!canSubmit"
                  @click="save"
                >
                  <i data-lucide="save" class="icon" style="width:16px;height:16px"></i>
                  <span class="ml-1">Save</span>
                </button>
              </div>
              <div class="control">
                <button type="button" class="button" @click="cancel" :disabled="isSubmitting">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </template>
      </section>
    </div>
  </div>
</div>

  <!-- Multi-word modal -->
  <div x-data="multiWordModal" x-cloak>
  <div class="modal" :class="{ 'is-active': isOpen }" role="dialog" aria-modal="true" aria-labelledby="multi-word-modal-title">
    <div class="modal-background" @click="close"></div>
    <div class="modal-card" style="max-width: 500px;">
      <header class="modal-card-head py-3">
        <p class="modal-card-title is-size-6" id="multi-word-modal-title" x-text="modalTitle"></p>
        <button class="delete" aria-label="Close dialog" @click="close" :disabled="isLoading || isSubmitting"></button>
      </header>
      <section class="modal-card-body">
        <!-- Loading overlay -->
        <div x-show="isLoading" class="has-text-centered py-4">
          <span class="icon is-large">
            <i data-lucide="loader-2" class="icon-spin" style="width:24px;height:24px" aria-hidden="true"></i>
          </span>
          <p class="mt-2">Loading...</p>
        </div>

        <!-- Form content -->
        <template x-if="!isLoading">
          <div>
            <!-- General error message -->
            <template x-if="hasGeneralError">
              <div class="notification is-danger is-light mb-4">
                <button class="delete" @click="clearGeneralError()"></button>
                <span x-text="generalError"></span>
              </div>
            </template>

            <!-- Multi-word text (read-only) -->
            <div class="field">
              <label class="label is-small">Multi-Word Expression</label>
              <div class="control">
                <input class="input" type="text" :value="formText" disabled>
              </div>
              <p class="help" x-text="wordCountLabel"></p>
            </div>

            <!-- Translation -->
            <div class="field">
              <label class="label is-small">Translation</label>
              <div class="control">
                <textarea
                  class="textarea"
                  :class="{ 'is-danger': hasTranslationError }"
                  x-model="translation"
                  @blur="validateField('translation')"
                  rows="2"
                  placeholder="Enter translation..."
                ></textarea>
              </div>
              <template x-if="hasTranslationError">
                <p class="help is-danger" x-text="translationError"></p>
              </template>
            </div>

            <!-- Romanization (if enabled for language) -->
            <template x-if="showRomanization">
              <div class="field">
                <label class="label is-small">Romanization</label>
                <div class="control">
                  <input
                    class="input"
                    :class="{ 'is-danger': hasRomanizationError }"
                    type="text"
                    x-model="romanization"
                    @blur="validateField('romanization')"
                    placeholder="Enter romanization..."
                  >
                </div>
                <template x-if="hasRomanizationError">
                  <p class="help is-danger" x-text="romanizationError"></p>
                </template>
              </div>
            </template>

            <!-- Sentence -->
            <div class="field">
              <label class="label is-small">Example Sentence</label>
              <div class="control">
                <textarea
                  class="textarea"
                  :class="{ 'is-danger': hasSentenceError }"
                  x-model="sentence"
                  @blur="validateField('sentence')"
                  rows="2"
                  placeholder="Example sentence with {term} in braces..."
                ></textarea>
              </div>
              <template x-if="hasSentenceError">
                <p class="help is-danger" x-text="sentenceError"></p>
              </template>
              <p class="help">Use {curly braces} around the term</p>
            </div>

            <!-- New multi-word expressions start as Learning; the level 1-5 is
                 then derived from FSRS, not hand-set (issue #238). -->

            <!-- Action buttons -->
            <div class="field is-grouped mt-5">
              <div class="control">
                <button
                  type="button"
                  class="button is-primary"
                  :class="{ 'is-loading': isSubmitting }"
                  :disabled="!canSubmit"
                  @click="save"
                >
                  <i data-lucide="save" class="icon" style="width:16px;height:16px"></i>
                  <span class="ml-1">Save</span>
                </button>
              </div>
              <div class="control">
                <button type="button" class="button" @click="close" :disabled="isSubmitting">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </template>
      </section>
    </div>
  </div>
</div>
</div>

<style>
/* Reading page specific styles */
.reading-page {
  min-height: 100vh;
}

.reading-content {
  max-width: 100%;
  margin: 0 auto;
  transition: max-width 0.2s ease;
}

#thetext {
  line-height: 1.8;
}

#thetext p {
  margin-bottom: 1rem;
}

/* Word styling */
.wsty, .mwsty {
  cursor: pointer;
  padding: 0 0.1em;
  border-radius: 3px;
}

.wsty:hover, .mwsty:hover {
  background-color: rgba(0, 0, 0, 0.1);
}

/* Status colors - underlines instead of backgrounds */
.status0 { border-bottom: solid 2px #5ABAFF; } /* Unknown - blue */
.status1 { border-bottom: solid 2px #E85A3C; } /* Level 1 - red */
.status2 { border-bottom: solid 2px #E8893C; } /* Level 2 - orange */
.status3 { border-bottom: solid 2px #E8B83C; } /* Level 3 - yellow */
.status4 { border-bottom: solid 2px #E8E23C; } /* Level 4 - pale yellow */
.status5 { border-bottom: solid 2px #66CC66; } /* Level 5 - green */
.status98 { border-bottom: dashed 1px #888888; color: #999; } /* Ignored */
.status99 { border-bottom: solid 2px #CCFFCC; } /* Well-known */

/* Hide translations class */
.hide-translations .word-ann {
  display: none !important;
}

/* Hidden items */
.hide {
  display: none !important;
}

/* Alpine.js cloak */
[x-cloak] {
  display: none !important;
}

/* Loading spinner */
.loading-spinner {
  width: 40px;
  height: 40px;
  margin: 0 auto;
  border: 3px solid #dbdbdb;
  border-top-color: #3273dc;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>

<script type="application/json" id="text-reader-config">{}</script>
  <script type="module" src="./read.ts"></script>
</body>
</html>
