<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Read</title>
  <meta name="lukaisu-modules" content="vocabulary,text,review,language" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <!-- Body prerendered at build time from the server's reader view (just the
       navbar mount point now). The reader, word popover/modal, multi-word modal
       AND the audio player are Svelte islands inside #text-reader-root, mounted
       by read.ts (the audio player renders between the toolbar and the text,
       only when the text has audio). The #navbar-root is hydrated from
       GET /api/v1/navbar. -->
  <!-- Main navigation -->
<div id="navbar-root" data-navbar-root data-current-page="texts"></div>

  <!-- Svelte 5 reader island (mounted by read.ts). Replaces the four coupled
       Alpine x-data regions (textReader / wordPopover / wordModal+wordEditForm /
       multiWordModal), which shared three Alpine stores and called each other's
       methods. The Alpine components (text_reader.ts, word_popover.ts, …) still
       load via the page's module meta but no-op here with no x-data nodes, and
       stay as the PWA's renderer until the server UI retires. -->
  <div id="text-reader-root"></div>

<style>
/* Reading page specific styles */
.reading-page {
  min-height: 100vh;
}

.reading-content {
  max-width: 100%;
  margin: 0 auto;
  transition: max-width 0.2s ease;
}

#thetext {
  line-height: 1.8;
}

#thetext p {
  margin-bottom: 1rem;
}

/* Word styling */
.wsty, .mwsty {
  cursor: pointer;
  padding: 0 0.1em;
  border-radius: 3px;
}

.wsty:hover, .mwsty:hover {
  background-color: rgba(0, 0, 0, 0.1);
}

/* Status colors - underlines instead of backgrounds */
.status0 { border-bottom: solid 2px #5ABAFF; } /* Unknown - blue */
.status1 { border-bottom: solid 2px #E85A3C; } /* Level 1 - red */
.status2 { border-bottom: solid 2px #E8893C; } /* Level 2 - orange */
.status3 { border-bottom: solid 2px #E8B83C; } /* Level 3 - yellow */
.status4 { border-bottom: solid 2px #E8E23C; } /* Level 4 - pale yellow */
.status5 { border-bottom: solid 2px #66CC66; } /* Level 5 - green */
.status98 { border-bottom: dashed 1px #888888; color: #999; } /* Ignored */
.status99 { border-bottom: solid 2px #CCFFCC; } /* Well-known */

/* Hide translations class */
.hide-translations .word-ann {
  display: none !important;
}

/* Hidden items */
.hide {
  display: none !important;
}

/* Alpine.js cloak */
[x-cloak] {
  display: none !important;
}

/* Loading spinner */
.loading-spinner {
  width: 40px;
  height: 40px;
  margin: 0 auto;
  border: 3px solid #dbdbdb;
  border-top-color: #3273dc;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>

<script type="application/json" id="text-reader-config">{}</script>
  <script type="module" src="./read.ts"></script>
</body>
</html>
