<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu — Archived Texts</title>
  <meta name="lukaisu-modules" content="text" />
  <style>[x-cloak]{display:none !important}</style>
</head>
<body>
  <!-- Real navbar, hydrated from GET /api/v1/navbar (mountNavbar in main.ts). -->
  <div id="navbar-root" data-navbar-root data-current-page="texts"></div>
  <section class="section pt-4">
    <h1 class="title is-4">Archived Texts</h1>
    <!-- Body prerendered from src/Modules/Text/Views/archived_list.php.
         Regenerate: php build/prerender-app-view.php -->
    <div class="card action-card mb-4">
        <div class="card-content">
            <div class="buttons is-centered">
                                <a href="/texts/new" class="button is-light is-primary">
                        <span class="icon"><i data-lucide="circle-plus" class="icon" aria-label="New Text" style="width:16px;height:16px"></i></span>
                        <span>New Text</span>
                    </a>                <a href="/texts?query=&amp;page=1" class="button is-light">
                        <span class="icon"><i data-lucide="book-open" class="icon" aria-label="Active Texts" style="width:16px;height:16px"></i></span>
                        <span>Active Texts</span>
                    </a>
            </div>
        </div>
    </div>
    <!-- Alpine.js container for grouped archived texts -->
    <div x-data="archivedTextsGroupedApp" x-init="init()" x-cloak>
    
        <!-- Loading state -->
        <div x-show="loading" class="has-text-centered py-6">
            <span class="icon is-large">
                <i data-lucide="loader-2" class="icon-spin"></i>
            </span>
            <p class="mt-2">Loading archived texts...</p>
        </div>
    
        <!-- Global sort control -->
        <div x-show="!loading && languages.length > 0" class="box mb-4">
            <div class="level">
                <div class="level-left">
                    <div class="level-item">
                        <span
                            class="has-text-weight-semibold"
                            x-text="totalArchivedSummary()"></span>
                    </div>
                </div>
                <div class="level-right">
                    <div class="level-item">
                        <div class="field has-addons">
                            <div class="control">
                                <span class="button is-static is-small">Sort</span>
                            </div>
                            <div class="control">
                                <div class="select is-small">
                                    <select
                                        @change="handleSortChange($event)"
                                        aria-label="Sort texts by">
                                        <option value="1" selected="selected" >Title A-Z</option><option value="2">Newest first</option><option value="3">Oldest first</option>                                </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- Language sections -->
        <template x-for="lang in languages" :key="lang.id">
            <div class="card mb-4">
                <!-- Collapsible header -->
                <header class="card-header is-clickable" @click="toggleLanguage(lang.id)" style="user-select: none;">
                    <p class="card-header-title">
                        <span x-text="lang.name"></span>
                        <span
                            class="tag is-warning ml-2"
                            x-text="archivedCountLabel(lang.text_count)"></span>
                    </p>
                    <button
                        class="card-header-icon"
                        type="button"
                        :aria-label="collapseAriaLabel(lang.id, lang.name)"
                        :aria-expanded="!isCollapsed(lang.id)">
                        <span class="icon">
                            <i :data-lucide="chevronIcon(lang.id)"></i>
                        </span>
                    </button>
                </header>
    
                <!-- Content (texts for this language) -->
                <div class="card-content" x-show="!isCollapsed(lang.id)" x-collapse.duration.200ms>
                    <!-- Loading state for this language -->
                    <div
                        x-show="isLoadingMore(lang.id) && getTextsForLanguage(lang.id).length === 0"
                        class="has-text-centered py-4">
                        <span class="icon">
                            <i data-lucide="loader-2" class="icon-spin"></i>
                        </span>
                        <span class="ml-2">Loading...</span>
                    </div>
    
                    <!-- Per-language bulk actions -->
                    <div x-show="getTextsForLanguage(lang.id).length > 0" class="level mb-4">
                        <div class="level-left">
                            <div class="level-item">
                                <div class="buttons are-small">
                                    <button type="button" class="button" @click="markAll(lang.id, true)">
                                        <i data-lucide="square-check-big" class="icon" style="width:14px;height:14px"></i>                                    <span class="ml-1">Mark All</span>
                                    </button>
                                    <button type="button" class="button" @click="markAll(lang.id, false)">
                                        <i data-lucide="square" class="icon" style="width:14px;height:14px"></i>                                    <span class="ml-1">Mark None</span>
                                    </button>
                                    <span
                                        x-show="hasMarkedInLanguage(lang.id)"
                                        class="tag is-warning ml-2"
                                        x-text="getMarkedCount(lang.id) + ' selected'"></span>
                                </div>
                            </div>
                        </div>
                        <div class="level-right">
                            <div class="level-item">
                                <div class="field has-addons">
                                    <div class="control">
                                        <span class="button is-static is-small">
                                            <i data-lucide="zap" class="icon" style="width:14px;height:14px"></i>                                        <span class="ml-1">Actions</span>
                                        </span>
                                    </div>
                                    <div class="control">
                                        <div class="select is-small">
                                            <select
                                                :disabled="!hasMarkedInLanguage(lang.id)"
                                                @change="handleMultiAction(lang.id, $event)"
                                                aria-label="Bulk actions for selected texts">
                                                <option value="" selected="selected">[Choose...]</option><option disabled="disabled">------------</option><option value="addtag">Add Tag</option><option value="deltag">Remove Tag</option><option disabled="disabled">------------</option><option value="unarch">Unarchive Marked Texts</option><option disabled="disabled">------------</option><option value="del">Delete Marked Texts</option>                                        </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
    
                    <!-- Text cards grid -->
                    <div
                        class="columns is-multiline text-cards archived-text-cards"
                        x-show="getTextsForLanguage(lang.id).length > 0">
                        <template x-for="text in getTextsForLanguage(lang.id)" :key="text.id">
                            <div class="column is-4-desktop is-6-tablet is-12-mobile">
                                <div class="card text-card is-archived">
                                    <header class="card-header">
                                        <label class="card-header-icon checkbox-wrapper" @click.stop>
                                            <input type="checkbox"
                                                   class="markcheck"
                                                   :aria-label="'Select ' + text.title"
                                                   :checked="isMarked(lang.id, text.id)"
                                                   @change="toggleMark(lang.id, text.id, $event.target.checked)" />
                                        </label>
                                        <p class="card-header-title" x-text="text.title"></p>
                                        <div class="card-header-icon card-icons">
                                            <span x-show="text.has_audio" title="With Audio">
                                                <i data-lucide="volume-2" class="icon" style="width:16px;height:16px"></i>                                        </span>
                                            <a
                                                x-show="text.has_source"
                                                :href="text.source_uri"
                                                target="_blank"
                                                title="Source Link"
                                                @click.stop>
                                                <i data-lucide="external-link" class="icon" style="width:16px;height:16px"></i>                                        </a>
                                            <span x-show="text.annotated" title="Annotated Text">
                                                <i data-lucide="file-text" class="icon" style="width:16px;height:16px"></i>                                        </span>
                                        </div>
                                    </header>
    
                                    <div class="card-content">
                                        <!-- Tags -->
                                        <div x-show="text.taglist" class="text-meta mb-3">
                                            <div class="tags">
                                                <template x-for="tag in parseTags(text.taglist)" :key="tag">
                                                    <span class="tag is-info is-light is-small" x-text="tag"></span>
                                                </template>
                                            </div>
                                        </div>
    
                                        <!-- Archive Status Badge -->
                                        <div class="archive-badge">
                                            <span class="tag is-warning is-light">
                                                <i data-lucide="archive" class="icon" style="width:12px;height:12px"></i>                                            <span class="ml-1">Archived</span>
                                            </span>
                                        </div>
                                    </div>
    
                                    <footer class="card-footer">
                                        <a
                                            href="#"
                                            class="card-footer-item is-primary-action"
                                            @click.prevent="handlePostAction($event, '/texts/' + text.id + '/unarchive')">
                                            <i data-lucide="archive-restore" class="icon" style="width:16px;height:16px"></i>                                        <span>Unarchive</span>
                                        </a>
                                        <a :href="'/text/archived/' + text.id + '/edit'" class="card-footer-item">
                                            <i data-lucide="file-pen" class="icon" style="width:16px;height:16px"></i>                                        <span>Edit</span>
                                        </a>
                                        <a
                                            class="card-footer-item has-text-danger"
                                            @click.prevent="handleRestDelete($event, '/text/archived/' + text.id)">
                                            <i data-lucide="trash-2" class="icon" style="width:16px;height:16px"></i>                                        <span>Delete</span>
                                        </a>
                                    </footer>
                                </div>
                            </div>
                        </template>
                    </div>
    
                    <!-- Per-language "Show More" pagination -->
                    <div x-show="hasMoreTexts(lang.id)" class="has-text-centered mt-4">
                        <button type="button"
                                class="button is-info is-outlined"
                                @click="loadMoreTexts(lang.id)"
                                :class="{ 'is-loading': isLoadingMore(lang.id) }">
                            <span class="icon">
                                <i data-lucide="chevron-down"></i>
                            </span>
                            <span>Show More</span>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    
        <!-- Empty state -->
        <div x-show="!loading && languages.length === 0" class="notification is-info is-light">
            <p>No archived texts found. Texts you archive will appear here.</p>
        </div>
    </div>
    
    <!-- Config for Alpine - pass active language for default expansion -->
    <script type="application/json" id="archived-texts-grouped-config">{"activeLanguageId":0}</script>
  </section>
  <script type="module" src="./texts.ts"></script>
</body>
</html>
