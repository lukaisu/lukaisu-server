# Lukaisu Server Docker Compose Configuration
#
# Usage:
#   1. Copy .env.example to .env and configure your settings
#   2. Run: docker compose up
#   3. Access at http://localhost:8010/
#
# The .env file is automatically read by docker compose.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_BASE_PATH=${APP_BASE_PATH:-}
        - APACHE_PORT=${APACHE_PORT:-80}
    container_name: lukaisu-server
    depends_on:
      - db
      - nlp
    environment:
      # Database configuration for Docker
      # DB_HOST and DB_USER are hardcoded for the Docker setup
      # DB_PASSWORD and DB_NAME can be customized via .env file
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-lukaisu}
      - APP_BASE_PATH=${APP_BASE_PATH:-}
      - NLP_SERVICE_URL=http://nlp:8000
      - MULTI_USER_ENABLED=${MULTI_USER_ENABLED:-false}
      - APP_URL=${APP_URL:-}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      # Cross-origin allow-list for the bundled ("Model B") client. Empty by
      # default (CORS stays off); set to the bundle origin(s), e.g.
      # https://localhost for the Android app.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ./media:/var/www/html${APP_BASE_PATH:-}/media
    ports:
      - "${WEB_PORT:-8010}:${APACHE_PORT:-80}"
    restart: unless-stopped

  db:
    container_name: lukaisu-server_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-lukaisu}
    hostname: db
    image: mariadb:12.1
    restart: unless-stopped
    volumes:
      - ./lukaisu_db_data:/var/lib/mysql

  nlp:
    build:
      context: ./services/nlp
    container_name: lukaisu-server_nlp
    volumes:
      - nlp_voices:/app/voices
    environment:
      PIPER_VOICES_DIR: /app/voices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nlp_voices:
