# Standalone Lukaisu edge service.
#
# Runs the Python NLP + outbound service ON ITS OWN — no PHP container, no
# database. This is the deployment the Lukaisu app talks to directly when a
# user opts into a server.
#
# Usage (from this directory):
#   docker compose up --build            # full image (NLP + outbound edge)
#   EDGE_ONLY=1 docker compose up --build  # lightweight outbound-only image
#
# Then: curl http://localhost:8000/capabilities
#
# CORS defaults to "*" (the service is stateless and carries no credentials).
# Set CORS_ALLOWED_ORIGINS to lock it to your app origin in production.

services:
  edge:
    build:
      context: .
      args:
        - EDGE_ONLY=${EDGE_ONLY:-}
    container_name: lukaisu-edge
    environment:
      PIPER_VOICES_DIR: /app/voices
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      # Optional: enable the YouTube video-info endpoint.
      YT_API_KEY: ${YT_API_KEY:-}
    volumes:
      - edge_voices:/app/voices
    ports:
      - "${EDGE_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  edge_voices:
